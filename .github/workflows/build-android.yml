name: Build Coffee Hub Android APK

on:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Android APK
        run: |
          cd coffee-hub-android
          bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CoffeeHub-APK
          path: coffee-hub-android/app-release-signed.apk